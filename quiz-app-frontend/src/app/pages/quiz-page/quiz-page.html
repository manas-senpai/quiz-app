<div class="flex w-full max-w-4xl flex-col gap-4">
  <div class="glass-panel flex flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-5">
    <div>
      <p class="text-lg font-bold text-slate-800">
        {{ currentQuestionIndex() + 1 }}/{{ quizData().questions.length }}
      </p>
    </div>

    <div class="flex flex-wrap items-center gap-2">
      <span class="quiz-chip">Score : {{ correctCount() }}/{{ quizData().questions.length }}</span>
      <p class="quiz-timer">{{ timeLeft() }} Seconds Left</p>
    </div>
  </div>

  <div class="flex w-full justify-center">
    <app-quiz-card [question]="quizData().questions[currentQuestionIndex()]" [selectedOption]="currentSelectedOption()"
      (answerSelected)="recordAnswer($event)" (nextQuestion)="next()" (endQuiz)="end()" />
  </div>
</div>
