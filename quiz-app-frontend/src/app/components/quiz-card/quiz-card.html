<div class="glass-panel result-reveal mt-2 flex w-full max-w-2xl flex-col items-center gap-5 p-5 sm:p-7">

  <h2 class="text-center text-2xl font-black text-slate-800">{{ question().question }}</h2>

  <div class="w-full">
    <div class="flex min-w-70 flex-1 flex-col items-start gap-3 rounded-2xl bg-[rgba(91,77,255,0.04)] p-3 sm:p-4">
      @for (option of question().options; track option) {
      <button class="quiz-option cursor-pointer" [class.quiz-option-selected]="selectedOption() === option"
        [class.quiz-option-correct]="isCorrectOption(option)" [class.quiz-option-wrong]="isWrongSelection(option)"
        (click)="chooseOption(option)" [disabled]="isAnswered()">
        <span>{{ option }}</span>

      </button>
      }
    </div>
  </div>

  <div class="mt-2 flex flex-wrap justify-center gap-3">
    <button class="quiz-action-primary max-w-fit cursor-pointer px-4 py-2" (click)="nextQuestion.emit()"
      [disabled]="!selectedOption()">
      Next question
    </button>
    <button class="quiz-action-secondary max-w-fit cursor-pointer px-4 py-2" (click)="endQuiz.emit()">
      End quiz
    </button>
  </div>
</div>
